<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Plakar Dashboard Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
  margin:0;
  background:#0f172a;
  font-family:Arial;
  color:white;
}

header{
  background:#111827;
  padding:15px;
  font-size:20px;
  font-weight:bold;
  text-align:center;
}

nav{
  display:flex;
  justify-content:center;
  gap:10px;
  background:#1e293b;
  padding:10px;
  flex-wrap:wrap;
}

nav button{
  background:#334155;
  border:none;
  padding:8px 14px;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

nav button.active{
  background:#22c55e;
}

.container{
  padding:20px;
  max-width:1200px;
  margin:auto;
}

.tab{
  display:none;
}

.tab.active{
  display:block;
}

.card{
  background:#1e293b;
  padding:15px;
  margin-bottom:10px;
  border-radius:8px;
}

.card-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.card button{
  margin-top:8px;
  background:#2563eb;
  border:none;
  padding:6px 10px;
  border-radius:4px;
  color:white;
  cursor:pointer;
}

.chances{
  margin-top:10px;
  display:none;
  font-size:14px;
}

.strong{ color:#22c55e; font-weight:bold; }
.medium{ color:#facc15; font-weight:bold; }
.neutral{ color:#cbd5e1; }

.panel{
  background:#111827;
  padding:20px;
  border-radius:8px;
  margin-top:20px;
}

.small{
  font-size:12px;
  color:#94a3b8;
}

</style>
</head>
<body>

<header>⚽ Plakar Dashboard Pro</header>

<nav>
<button onclick="trocarAba('radar')" class="active">Radar</button>
<button onclick="trocarAba('ouro')">Ouro</button>
<button onclick="trocarAba('prata')">Prata</button>
<button onclick="trocarAba('live')">Ao Vivo</button>
<button onclick="trocarAba('stats')">Estatísticas</button>
</nav>

<div class="container">

<div id="radar" class="tab active"></div>
<div id="ouro" class="tab"></div>
<div id="prata" class="tab"></div>
<div id="live" class="tab"></div>

<div id="stats" class="tab">
  <div class="panel">
    <h2>📊 Assertividade</h2>
    <div id="estatisticas">Calculando...</div>
  </div>
</div>

</div>

<script>

function trocarAba(id){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
}

function classe(prob){
  if(prob>=0.70) return "strong";
  if(prob>=0.60) return "medium";
  return "neutral";
}

function toggleChances(btn){
  const div = btn.nextElementSibling;
  div.style.display = div.style.display==="block"?"none":"block";
}

function salvar(reg){
  let h = JSON.parse(localStorage.getItem("historico")||"[]");
  if(!h.find(x=>x.jogo===reg.jogo && x.mercado===reg.mercado)){
    h.push(reg);
    localStorage.setItem("historico",JSON.stringify(h));
  }
}

async function carregar(){

  const res = await fetch("/api/games");
  const jogos = await res.json();

  let radarHTML="";
  let ouroHTML="";
  let prataHTML="";
  let liveHTML="";

  for(const jogo of jogos.slice(0,20)){

    const r = await fetch(`/api/analyze?homeId=${jogo.homeId}&awayId=${jogo.awayId}&home=${encodeURIComponent(jogo.home)}&away=${encodeURIComponent(jogo.away)}`);
    const data = await r.json();

    const mercados = [
      {nome:"Casa",prob:data.probCasa},
      {nome:"Fora",prob:data.probFora},
      {nome:"Over",prob:data.over25},
      {nome:"BTTS",prob:data.btts}
    ];

    let card = `
      <div class="card">
        <div class="card-header">
          <div>
            ${jogo.home} vs ${jogo.away}
            <div class="small">${jogo.status}</div>
          </div>
        </div>
        <button onclick="toggleChances(this)">Ver Chances</button>
        <div class="chances">
          ${mercados.map(m=>{
            if(m.prob>=0.55){
              salvar({
                jogo:`${jogo.home} vs ${jogo.away}`,
                mercado:m.nome,
                prob:m.prob,
                status:"pendente"
              });
              return `<div class="${classe(m.prob)}">
                ${m.nome}: ${(m.prob*100).toFixed(2)}% | Odd ${(1/m.prob).toFixed(2)}
              </div>`;
            }
            return "";
          }).join("")}
        </div>
      </div>
    `;

    if(jogo.status==="LIVE"){
      liveHTML+=card;
    }else{
      radarHTML+=card;
    }

    if(mercados.some(m=>m.prob>=0.70)) ouroHTML+=card;
    if(mercados.some(m=>m.prob>=0.60 && m.prob<0.70)) prataHTML+=card;
  }

  document.getElementById("radar").innerHTML=radarHTML;
  document.getElementById("ouro").innerHTML=ouroHTML;
  document.getElementById("prata").innerHTML=prataHTML;
  document.getElementById("live").innerHTML=liveHTML;

  atualizarStats();
}

function atualizarStats(){
  let h = JSON.parse(localStorage.getItem("historico")||"[]");
  const total = h.filter(x=>x.status!=="pendente").length;
  const acertos = h.filter(x=>x.status==="acerto").length;
  const taxa = total>0?((acertos/total)*100).toFixed(2):0;
  document.getElementById("estatisticas").innerHTML=
    `Total Avaliado: ${total}<br>Taxa Geral: ${taxa}%`;
}

carregar();
setInterval(carregar,600000);

</script>

</body>
</html>
