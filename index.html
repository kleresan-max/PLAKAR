<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KLERIN ANÁLISES AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:linear-gradient(180deg,#0f172a,#0b1220);
  color:white;
}

header{
  padding:20px;
  text-align:center;
  font-weight:800;
  font-size:22px;
  background:#111827;
}

.container{
  padding:20px;
  max-width:1100px;
  margin:auto;
}

.league{
  margin-top:30px;
  font-size:14px;
  font-weight:600;
  color:#94a3b8;
  border-bottom:1px solid rgba(255,255,255,0.1);
  padding-bottom:5px;
}

.card{
  background:#1e293b;
  margin-top:15px;
  padding:18px;
  border-radius:14px;
  box-shadow:0 8px 25px rgba(0,0,0,0.4);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.match{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.team{
  display:flex;
  align-items:center;
  gap:10px;
  width:40%;
}

.team img{
  width:32px;
  height:32px;
}

.vs{
  font-weight:800;
  font-size:14px;
  color:#94a3b8;
}

.status{
  margin-top:8px;
  font-size:12px;
  color:#facc15;
}

</style>
</head>
<body>

<header>⚡ KLERIN ANÁLISES AI</header>

<div class="container" id="conteudo"></div>

<script>

async function carregar(){

  const res = await fetch("/api/games");
  const jogos = await res.json();

  let html="";
  let ligas = {};

  // Agrupar por liga
  jogos.forEach(jogo=>{
    if(!ligas[jogo.competition]){
      ligas[jogo.competition]=[];
    }
    ligas[jogo.competition].push(jogo);
  });

  for(const liga in ligas){

    html+=`<div class="league">${liga}</div>`;

    ligas[liga].forEach(jogo=>{

      html+=`
      <div class="card">
        <div class="match">
          <div class="team">
            <img src="${jogo.homeCrest}">
            ${jogo.home}
          </div>

          <div class="vs">vs</div>

          <div class="team" style="justify-content:flex-end;">
            ${jogo.away}
            <img src="${jogo.awayCrest}">
          </div>
        </div>

        <div class="status">
          Status: ${jogo.status}
        </div>
      </div>
      `;
    });

  }

  document.getElementById("conteudo").innerHTML = html;
}

carregar();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
