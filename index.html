<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KLERIN ANÁLISES AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:linear-gradient(-45deg,#0f172a,#111827,#0b1220,#0f172a);
  background-size:400% 400%;
  animation:gradientMove 15s ease infinite;
  color:white;
}

@keyframes gradientMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

header{
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:800;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
}

.container{
  padding:20px;
  max-width:1100px;
  margin:auto;
}

/* LIGA */
.league{
  margin-top:30px;
  font-size:14px;
  font-weight:600;
  color:#94a3b8;
  border-left:4px solid #22c55e;
  padding-left:10px;
}

/* CARD */
.card{
  background:rgba(30,41,59,0.8);
  backdrop-filter:blur(8px);
  margin-top:15px;
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
}

/* TIMES */
.match{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.team{
  display:flex;
  align-items:center;
  gap:10px;
  width:35%;
}

.team img{
  width:36px;
  height:36px;
}

.score{
  font-size:26px;
  font-weight:800;
  text-align:center;
  width:20%;
}

/* ODDS */
.odds{
  display:flex;
  justify-content:space-between;
  margin-top:18px;
  gap:10px;
}

.odd-box{
  flex:1;
  background:#0f172a;
  padding:10px;
  border-radius:10px;
  text-align:center;
  font-size:13px;
  transition:0.3s;
}

.odd-box:hover{
  background:#1e293b;
}

/* OURO */
.gold-badge{
  background:#d4af37;
  color:black;
  padding:4px 8px;
  border-radius:8px;
  font-size:11px;
  font-weight:bold;
  margin-left:10px;
}

/* INDICADOR >=70% */
.strong{
  color:#22c55e;
  font-weight:bold;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{opacity:1}
  50%{opacity:0.4}
  100%{opacity:1}
}

.status{
  margin-top:8px;
  font-size:12px;
  color:#facc15;
}

</style>
</head>
<body>

<header>⚡ KLERIN ANÁLISES AI</header>

<div class="container" id="conteudo"></div>

<script>

async function carregar(){

  const res = await fetch("/api/games");
  const jogos = await res.json();

  let html="";
  let ligas = {};

  jogos.forEach(jogo=>{
    if(!ligas[jogo.competition]){
      ligas[jogo.competition]=[];
    }
    ligas[jogo.competition].push(jogo);
  });

  for(const liga in ligas){

    html+=`<div class="league">${liga}</div>`;

    for(const jogo of ligas[liga]){

      const r = await fetch(`/api/analyze?homeId=${jogo.homeId}&awayId=${jogo.awayId}&home=${encodeURIComponent(jogo.home)}&away=${encodeURIComponent(jogo.away)}`);
      const data = await r.json();

      const mercados = [
        {nome:"Casa",prob:data.probCasa},
        {nome:"Fora",prob:data.probFora},
        {nome:"Over 2.5",prob:data.over25},
        {nome:"BTTS",prob:data.btts}
      ];

      const temOuro = mercados.some(m=>m.prob>=0.70);

      html+=`
      <div class="card">

        <div class="match">
          <div class="team">
            <img src="${jogo.homeCrest}">
            ${jogo.home}
          </div>

          <div class="score">
            ${jogo.homeGoals ?? "-"} x ${jogo.awayGoals ?? "-"}
          </div>

          <div class="team" style="justify-content:flex-end;">
            ${jogo.away}
            <img src="${jogo.awayCrest}">
          </div>
        </div>

        <div class="status">
          ${jogo.status}
          ${temOuro ? '<span class="gold-badge">OURO</span>' : ''}
        </div>

        <div class="odds">
          ${mercados.map(m=>`
            <div class="odd-box ${m.prob>=0.70 ? 'strong':''}">
              ${m.nome}<br>
              ${(m.prob*100).toFixed(0)}%
            </div>
          `).join("")}
        </div>

      </div>
      `;
    }
  }

  document.getElementById("conteudo").innerHTML = html;
}

carregar();
setInterval(carregar,600000);

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
