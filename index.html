<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KLERIN ANÁLISES AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(-45deg,#0f172a,#111827,#0b1220,#0f172a);
  background-size:400% 400%;
  animation:gradientMove 15s ease infinite;
  color:white;
}

@keyframes gradientMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

header{
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:800;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(8px);
}

/* BOTÕES */
.top-buttons{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  flex-wrap:wrap;
}

.top-buttons button{
  padding:8px 16px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  background:#1e293b;
  color:white;
  font-weight:600;
}

.top-buttons .active{
  background:#22c55e;
}

/* CONTAINER */
.container{
  padding:15px;
  max-width:1100px;
  margin:auto;
}

/* LIGA */
.league{
  margin-top:25px;
  font-size:14px;
  font-weight:600;
  color:#94a3b8;
  border-left:4px solid #22c55e;
  padding-left:8px;
}

/* CARD */
.card{
  background:rgba(30,41,59,0.85);
  margin-top:15px;
  padding:15px;
  border-radius:14px;
  box-shadow:0 8px 25px rgba(0,0,0,0.5);
}

/* MATCH */
.match{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.team{
  display:flex;
  align-items:center;
  gap:8px;
  width:35%;
}

.team img{
  width:30px;
  height:30px;
}

.score{
  font-size:22px;
  font-weight:800;
  width:20%;
  text-align:center;
}

/* PROB BAR */
.prob-container{
  margin-top:12px;
}

.prob-label{
  font-size:12px;
  margin-bottom:4px;
}

.bar{
  height:6px;
  background:#0f172a;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  background:#22c55e;
}

/* CONF */
.conf{
  font-size:11px;
  margin-top:6px;
}

.alta{color:#22c55e}
.media{color:#facc15}
.baixa{color:#ef4444}

/* BADGE */
.gold{
  background:#d4af37;
  color:black;
  padding:3px 6px;
  border-radius:6px;
  font-size:10px;
  margin-left:8px;
}

/* RANKING */
.ranking{
  margin-top:20px;
  background:#111827;
  padding:15px;
  border-radius:12px;
}

.ranking h3{
  margin-top:0;
}

.rank-item{
  font-size:12px;
  margin-bottom:6px;
}

@media(max-width:600px){
  .team span{font-size:12px}
  .score{font-size:18px}
}
</style>
</head>
<body>

<header>⚡ KLERIN ANÁLISES AI</header>

<div class="top-buttons">
  <button onclick="mudarModo('radar')" class="active" id="btnRadar">Radar</button>
  <button onclick="mudarModo('ouro')" id="btnOuro">Ouro</button>
  <button onclick="mudarModo('prata')" id="btnPrata">Prata</button>
</div>

<div class="container">
  <div id="ranking"></div>
  <div id="conteudo"></div>
</div>

<script>

let modo="radar";

function mudarModo(novo){
  modo=novo;
  document.querySelectorAll('.top-buttons button').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn'+novo.charAt(0).toUpperCase()+novo.slice(1)).classList.add('active');
  carregar();
}

function nivelConf(prob){
  if(prob>=0.70) return "alta";
  if(prob>=0.60) return "media";
  return "baixa";
}

async function carregar(){

  const res = await fetch("/api/games");
  const jogos = await res.json();

  let html="";
  let rankingLista=[];

  for(const jogo of jogos){

    const r = await fetch(`/api/analyze?homeId=${jogo.homeId}&awayId=${jogo.awayId}&home=${encodeURIComponent(jogo.home)}&away=${encodeURIComponent(jogo.away)}`);
    const data = await r.json();

    const mercados=[
      {nome:"Casa",prob:data.probCasa},
      {nome:"Fora",prob:data.probFora},
      {nome:"Over 2.5",prob:data.over25},
      {nome:"BTTS",prob:data.btts}
    ];

    mercados.forEach(m=>{
      rankingLista.push({
        jogo: jogo.home+" vs "+jogo.away,
        mercado:m.nome,
        prob:m.prob
      });
    });

    const temOuro = mercados.some(m=>m.prob>=0.70);
    const temPrata = mercados.some(m=>m.prob>=0.60 && m.prob<0.70);

    if(modo==="ouro" && !temOuro) continue;
    if(modo==="prata" && !temPrata) continue;

    html+=`
    <div class="league">${jogo.competition}</div>
    <div class="card">
      <div class="match">
        <div class="team">
          <img src="${jogo.homeCrest}">
          <span>${jogo.home}</span>
        </div>
        <div class="score">- x -</div>
        <div class="team" style="justify-content:flex-end;">
          <span>${jogo.away}</span>
          <img src="${jogo.awayCrest}">
        </div>
      </div>
      ${mercados.map(m=>`
        <div class="prob-container">
          <div class="prob-label">
            ${m.nome} ${(m.prob*100).toFixed(0)}%
            ${m.prob>=0.70?'<span class="gold">OURO</span>':''}
          </div>
          <div class="bar">
            <div class="fill" style="width:${m.prob*100}%"></div>
          </div>
          <div class="conf ${nivelConf(m.prob)}">
            Confiança ${nivelConf(m.prob).toUpperCase()}
          </div>
        </div>
      `).join("")}
    </div>
    `;
  }

  document.getElementById("conteudo").innerHTML=html;

  rankingLista.sort((a,b)=>b.prob-a.prob);
  const top10=rankingLista.slice(0,10);

  document.getElementById("ranking").innerHTML=`
    <div class="ranking">
      <h3>📊 Top 10 Oportunidades</h3>
      ${top10.map(r=>`
        <div class="rank-item">
          ${r.jogo} — ${r.mercado} ${(r.prob*100).toFixed(0)}%
        </div>
      `).join("")}
    </div>
  `;
}

carregar();
setInterval(carregar,30000);

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
