<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KLERIN ANÁLISES AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:linear-gradient(180deg,#0f172a,#0b1220);
  color:white;
}

/* HERO COM IMAGEM */
.hero{
  position:relative;
  height:180px;
  background:url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=1600') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
}

.hero h1{
  position:relative;
  font-size:24px;
  font-weight:800;
}

/* BOTÕES SUPERIORES */
.top-buttons{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:-25px;
  padding:0 20px;
}

.top-buttons button{
  padding:10px 18px;
  border-radius:25px;
  border:none;
  font-weight:600;
  cursor:pointer;
  background:#1e293b;
  color:white;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
  transition:0.3s;
}

.top-buttons button:hover{
  transform:translateY(-3px);
}

.top-buttons .active{
  background:#22c55e;
}

/* CONTAINER */
.container{
  padding:20px;
  max-width:1100px;
  margin:auto;
}

/* LIGA */
.league{
  margin-top:30px;
  font-size:14px;
  font-weight:600;
  color:#94a3b8;
  border-left:4px solid #22c55e;
  padding-left:10px;
}

/* CARD */
.card{
  background:#1e293b;
  margin-top:15px;
  padding:18px;
  border-radius:14px;
  box-shadow:0 8px 25px rgba(0,0,0,0.4);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.match{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.team{
  display:flex;
  align-items:center;
  gap:10px;
  width:40%;
}

.team img{
  width:34px;
  height:34px;
}

.vs{
  font-weight:800;
  font-size:14px;
  color:#94a3b8;
}

.status{
  margin-top:8px;
  font-size:12px;
  color:#facc15;
}

</style>
</head>
<body>

<div class="hero">
  <h1>⚡ KLERIN ANÁLISES AI</h1>
</div>

<div class="top-buttons">
  <button class="active">Radar</button>
  <button>Ouro</button>
  <button>Ao Vivo</button>
</div>

<div class="container" id="conteudo"></div>

<script>

async function carregar(){

  const res = await fetch("/api/games");
  const jogos = await res.json();

  let html="";
  let ligas = {};

  jogos.forEach(jogo=>{
    if(!ligas[jogo.competition]){
      ligas[jogo.competition]=[];
    }
    ligas[jogo.competition].push(jogo);
  });

  for(const liga in ligas){

    html+=`<div class="league">${liga}</div>`;

    ligas[liga].forEach(jogo=>{

      html+=`
      <div class="card">
        <div class="match">
          <div class="team">
            <img src="${jogo.homeCrest}">
            ${jogo.home}
          </div>

          <div class="vs">vs</div>

          <div class="team" style="justify-content:flex-end;">
            ${jogo.away}
            <img src="${jogo.awayCrest}">
          </div>
        </div>

        <div class="status">
          Status: ${jogo.status}
        </div>
      </div>
      `;
    });

  }

  document.getElementById("conteudo").innerHTML = html;
}

carregar();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
