<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Radar Profissional + Assertividade</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
  margin:0;
  background:#0f172a;
  font-family:Arial;
  color:white;
}

header{
  padding:20px;
  background:#111827;
  font-size:20px;
  font-weight:bold;
}

.container{
  padding:25px;
  max-width:1300px;
  margin:auto;
}

.section{
  margin-bottom:40px;
}

.card{
  background:#1e293b;
  padding:10px 14px;
  margin-bottom:8px;
  border-radius:6px;
  display:flex;
  justify-content:space-between;
}

.small{
  font-size:12px;
  color:#94a3b8;
}

.strong{ color:#22c55e; font-weight:bold; }
.medium{ color:#84cc16; font-weight:bold; }
.neutral{ color:#cbd5e1; }

.panel{
  background:#111827;
  padding:20px;
  border-radius:8px;
  margin-top:40px;
}

</style>
</head>
<body>

<header>
🎯 Radar Profissional + Painel de Assertividade
</header>

<div class="container">

<div id="conteudo">Carregando...</div>

<div class="panel">
<h2>📊 Painel de Assertividade</h2>
<div id="estatisticas">Calculando...</div>
</div>

</div>

<script>

function salvarPrevisao(registro){
  let historico = JSON.parse(localStorage.getItem("historico") || "[]");

  const jaExiste = historico.find(h =>
    h.jogo === registro.jogo &&
    h.mercado === registro.mercado
  );

  if(!jaExiste){
    historico.push(registro);
    localStorage.setItem("historico", JSON.stringify(historico));
  }
}

async function verificarResultados(){

  let historico = JSON.parse(localStorage.getItem("historico") || "[]");

  for(let registro of historico){

    if(registro.status !== "pendente") continue;

    const res = await fetch(`/api/result?home=${encodeURIComponent(registro.home)}&away=${encodeURIComponent(registro.away)}`);
    const resultado = await res.json();

    if(resultado.status !== "FINISHED") continue;

    const golsCasa = resultado.homeGoals;
    const golsFora = resultado.awayGoals;

    let acertou = false;

    if(registro.mercado === "Casa" && golsCasa > golsFora) acertou = true;
    if(registro.mercado === "Fora" && golsFora > golsCasa) acertou = true;
    if(registro.mercado === "Over" && (golsCasa + golsFora) > 2) acertou = true;
    if(registro.mercado === "BTTS" && golsCasa > 0 && golsFora > 0) acertou = true;

    registro.status = acertou ? "acerto" : "erro";
  }

  localStorage.setItem("historico", JSON.stringify(historico));
  atualizarEstatisticas();
}

function atualizarEstatisticas(){

  let historico = JSON.parse(localStorage.getItem("historico") || "[]");

  const finalizados = historico.filter(h => h.status !== "pendente");

  const acertos = finalizados.filter(h => h.status === "acerto").length;
  const erros = finalizados.filter(h => h.status === "erro").length;

  const total = finalizados.length;
  const taxa = total > 0 ? ((acertos/total)*100).toFixed(2) : 0;

  document.getElementById("estatisticas").innerHTML = `
    Total Avaliado: ${total}<br>
    Acertos: ${acertos}<br>
    Erros: ${erros}<br>
    Taxa Geral: ${taxa}%
  `;
}

async function carregar(){

  const res = await fetch("/api/games");
  const jogos = await res.json();

  let conteudo = "";

  for(const jogo of jogos.slice(0,20)){

    const r = await fetch(`/api/analyze?homeId=${jogo.homeId}&awayId=${jogo.awayId}&home=${encodeURIComponent(jogo.home)}&away=${encodeURIComponent(jogo.away)}`);
    const data = await r.json();

    const mercados = [
      { nome:"Casa", prob:data.probCasa },
      { nome:"Fora", prob:data.probFora },
      { nome:"Over", prob:data.over25 },
      { nome:"BTTS", prob:data.btts }
    ];

    mercados.forEach(m=>{
      if(m.prob >= 0.55){

        salvarPrevisao({
          jogo:`${jogo.home} vs ${jogo.away}`,
          home:jogo.home,
          away:jogo.away,
          mercado:m.nome,
          prob:m.prob,
          status:"pendente"
        });

        const classe = m.prob >=0.70 ? "strong" :
                       m.prob >=0.60 ? "medium" : "neutral";

        conteudo += `
          <div class="card">
            <div>
              ${m.nome} – ${jogo.home} vs ${jogo.away}
              <div class="small">${(m.prob*100).toFixed(2)}% | Odd Justa ${(1/m.prob).toFixed(2)}</div>
            </div>
            <div class="${classe}">
              ${(m.prob*100).toFixed(2)}%
            </div>
          </div>
        `;
      }
    });
  }

  document.getElementById("conteudo").innerHTML = conteudo;

  verificarResultados();
}

carregar();
setInterval(carregar, 600000);

</script>

</body>
</html>
