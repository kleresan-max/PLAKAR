<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KLERIN ANÁLISES AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">

<style>

body{
  margin:0;
  font-family:Inter, Arial;
  background:#0f172a;
  color:white;
}

/* HEADER */
header{
  padding:16px;
  text-align:center;
  font-size:20px;
  font-weight:600;
  background:#111827;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

/* NAV */
nav{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:12px;
  background:#0f172a;
}

nav button{
  padding:8px 16px;
  border:none;
  border-radius:20px;
  background:#1f2937;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

nav button.active{
  background:#22c55e;
}

/* CONTAINER */
.container{
  padding:20px;
  max-width:1100px;
  margin:auto;
}

/* CARD */
.card{
  background:#1e293b;
  border-radius:12px;
  padding:15px;
  margin-bottom:14px;
  box-shadow:0 4px 15px rgba(0,0,0,0.4);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-3px);
}

/* LIGA */
.league{
  font-size:13px;
  margin-bottom:8px;
  color:#94a3b8;
  display:flex;
  align-items:center;
  gap:8px;
}

.league img{
  width:20px;
}

/* TIMES */
.match{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.team{
  display:flex;
  align-items:center;
  gap:8px;
  width:45%;
}

.team img{
  width:28px;
  height:28px;
}

.vs{
  font-size:12px;
  color:#94a3b8;
}

/* BADGES */
.badge{
  font-size:11px;
  padding:3px 8px;
  border-radius:12px;
  margin-left:6px;
}

.gold{ background:#d4af37; color:black; }
.silver{ background:#9ca3af; color:black; }
.live{ background:#ef4444; color:white; animation:pulse 1s infinite; }

@keyframes pulse{
  0%{opacity:1;}
  50%{opacity:0.5;}
  100%{opacity:1;}
}

/* BOTÃO */
button.view{
  margin-top:10px;
  padding:7px 12px;
  border:none;
  border-radius:6px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

/* CHANCES */
.chances{
  margin-top:10px;
  display:none;
  font-size:14px;
}

.strong{ color:#22c55e; font-weight:bold; }
.medium{ color:#facc15; font-weight:bold; }
.neutral{ color:#cbd5e1; }

.tab{ display:none; }
.tab.active{ display:block; }

</style>
</head>
<body>

<header>⚡ KLERIN ANÁLISES AI</header>

<nav>
<button onclick="trocar('radar')" class="active">Radar</button>
<button onclick="trocar('ouro')">Ouro</button>
<button onclick="trocar('prata')">Prata</button>
<button onclick="trocar('live')">Ao Vivo</button>
</nav>

<div class="container">

<div id="radar" class="tab active"></div>
<div id="ouro" class="tab"></div>
<div id="prata" class="tab"></div>
<div id="live" class="tab"></div>

</div>

<script>

function trocar(id){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
}

function classe(prob){
  if(prob>=0.70) return "strong";
  if(prob>=0.60) return "medium";
  return "neutral";
}

function toggle(btn){
  const div = btn.nextElementSibling;
  div.style.display = div.style.display==="block"?"none":"block";
}

function flagURL(country){
  const map={
    "England":"gb",
    "Brazil":"br",
    "Spain":"es",
    "Germany":"de",
    "Italy":"it",
    "France":"fr",
    "Portugal":"pt",
    "Argentina":"ar"
  };
  const code = map[country] || "gb";
  return `https://flagcdn.com/w40/${code}.png`;
}

async function carregar(){

  const res = await fetch("/api/games");
  const jogos = await res.json();

  let radar="", ouro="", prata="", live="";

  for(const jogo of jogos.slice(0,20)){

    const r = await fetch(`/api/analyze?homeId=${jogo.homeId}&awayId=${jogo.awayId}&home=${encodeURIComponent(jogo.home)}&away=${encodeURIComponent(jogo.away)}`);
    const data = await r.json();

    const mercados = [
      {nome:"Casa",prob:data.probCasa},
      {nome:"Fora",prob:data.probFora},
      {nome:"Over",prob:data.over25},
      {nome:"BTTS",prob:data.btts}
    ];

    const temOuro = mercados.some(m=>m.prob>=0.70);
    const temPrata = mercados.some(m=>m.prob>=0.60 && m.prob<0.70);

    const homeCrest = `https://crests.football-data.org/${jogo.homeId}.svg`;
    const awayCrest = `https://crests.football-data.org/${jogo.awayId}.svg`;

    let card = `
      <div class="card">

        <div class="league">
          <img src="${flagURL(jogo.area)}">
          ${jogo.competition}
          ${jogo.status==="LIVE"?'<span class="badge live">AO VIVO</span>':''}
          ${temOuro?'<span class="badge gold">OURO</span>':
            temPrata?'<span class="badge silver">PRATA</span>':''}
        </div>

        <div class="match">
          <div class="team">
            <img src="${homeCrest}">
            ${jogo.home}
          </div>

          <div class="vs">vs</div>

          <div class="team" style="justify-content:flex-end;">
            ${jogo.away}
            <img src="${awayCrest}">
          </div>
        </div>

        <button class="view" onclick="toggle(this)">Ver Análise</button>

        <div class="chances">
          ${mercados.map(m=>`
            <div class="${classe(m.prob)}">
              ${m.nome}: ${(m.prob*100).toFixed(2)}% | Odd ${(1/m.prob).toFixed(2)}
            </div>
          `).join("")}
        </div>

      </div>
    `;

    radar += card;
    if(temOuro) ouro += card;
    if(temPrata) prata += card;
    if(jogo.status==="LIVE") live += card;
  }

  document.getElementById("radar").innerHTML = radar;
  document.getElementById("ouro").innerHTML = ouro;
  document.getElementById("prata").innerHTML = prata;
  document.getElementById("live").innerHTML = live;
}

carregar();
setInterval(carregar,600000);

/* PWA */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
