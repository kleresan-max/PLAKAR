<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Plakar Analytics</title>
<style>

body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  margin:0;
}

header{
  background:#111827;
  padding:20px;
  font-size:22px;
  font-weight:bold;
  text-align:center;
}

.container{
  padding:20px 40px;
}

.league{
  margin-top:30px;
}

.league-title{
  font-size:18px;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:10px;
}

.flag{
  width:24px;
  height:16px;
  object-fit:cover;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.card:hover{
  background:#334155;
}

.team{
  display:flex;
  align-items:center;
  gap:10px;
}

.crest{
  width:28px;
  height:28px;
  object-fit:contain;
}

.result{
  background:#111827;
  padding:20px;
  border-radius:10px;
  margin-top:30px;
}

.prob{
  margin:5px 0;
}

</style>
</head>
<body>

<header>Plakar Analytics Dashboard</header>

<div class="container">

<div id="jogos"></div>
<div class="result" id="analise"></div>

</div>

<script>

function countryToFlag(country){
  if(!country) return "";
  const code = country.slice(0,2).toLowerCase();
  return `https://flagcdn.com/24x18/${code}.png`;
}

async function carregarJogos(){

  const res = await fetch("/api/games");
  const jogos = await res.json();

  const container = document.getElementById("jogos");
  container.innerHTML = "";

  const ligas = {};

  jogos.forEach(jogo=>{
    if(!ligas[jogo.competition]){
      ligas[jogo.competition] = {
        country:jogo.country,
        games:[]
      };
    }
    ligas[jogo.competition].games.push(jogo);
  });

  for(const liga in ligas){

    const leagueDiv = document.createElement("div");
    leagueDiv.className="league";

    leagueDiv.innerHTML=`
      <div class="league-title">
        <img class="flag" src="${countryToFlag(ligas[liga].country)}">
        ${liga}
      </div>
    `;

    ligas[liga].games.forEach(jogo=>{
      leagueDiv.innerHTML+=`
        <div class="card" onclick="analisar('${jogo.homeId}','${jogo.awayId}','${jogo.home}','${jogo.away}')">
          <div class="team">
            <img class="crest" src="${jogo.homeCrest}">
            ${jogo.home}
          </div>
          vs
          <div class="team">
            ${jogo.away}
            <img class="crest" src="${jogo.awayCrest}">
          </div>
        </div>
      `;
    });

    container.appendChild(leagueDiv);
  }
}

async function analisar(homeId,awayId,home,away){

  document.getElementById("analise").innerHTML="Analisando...";

  const res = await fetch(`/api/analyze?homeId=${homeId}&awayId=${awayId}&home=${encodeURIComponent(home)}&away=${encodeURIComponent(away)}`);
  const data = await res.json();

  function oddJusta(prob){
    return (1/prob).toFixed(2);
  }

  document.getElementById("analise").innerHTML=`
    <h3>${data.home} vs ${data.away}</h3>

    <div class="prob">Casa: ${(data.probCasa*100).toFixed(2)}% | Odd Justa: ${oddJusta(data.probCasa)}</div>
    <div class="prob">Empate: ${(data.probEmpate*100).toFixed(2)}% | Odd Justa: ${oddJusta(data.probEmpate)}</div>
    <div class="prob">Fora: ${(data.probFora*100).toFixed(2)}% | Odd Justa: ${oddJusta(data.probFora)}</div>
    <div class="prob">Over 2.5: ${(data.over25*100).toFixed(2)}% | Odd Justa: ${oddJusta(data.over25)}</div>
    <div class="prob">BTTS: ${(data.btts*100).toFixed(2)}% | Odd Justa: ${oddJusta(data.btts)}</div>
  `;
}

carregarJogos();

</script>
</body>
</html>
