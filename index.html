<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jogos ao Vivo</title>
<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  padding:30px;
}
.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}
h2{
  margin-bottom:20px;
}
</style>
</head>
<body>

<h2>Jogos de Hoje</h2>
<div id="jogos">Carregando...</div>

<script>
async function carregarJogos(){
  try{
    const res = await fetch("/api/games");
    const jogos = await res.json();

    const div = document.getElementById("jogos");
    div.innerHTML = "";

    if(jogos.length === 0){
      div.innerHTML = "Nenhum jogo encontrado hoje.";
      return;
    }

    jogos.forEach(jogo=>{
      div.innerHTML += `
        <div class="card">
          <strong>${jogo.competition}</strong><br>
          ${jogo.home} vs ${jogo.away}<br>
          Status: ${jogo.status}
        </div>
      `;
    });

  }catch(error){
    document.getElementById("jogos").innerHTML = "Erro ao carregar jogos.";
  }
}

carregarJogos();
</script>

</body>
</html>
