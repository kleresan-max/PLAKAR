<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Plakar Analytics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{
  --bg:#0b1220;
  --panel:#0f172a;
  --card:#111827;
  --muted:#94a3b8;
  --accent:#22c55e;
  --gold1:#f5d27a;
  --gold2:#d4a017;
}

*{box-sizing:border-box}
body{
  margin:0;
  background:linear-gradient(180deg,#0b1220,#0e1628);
  color:white;
  font-family:Inter, Arial, sans-serif;
}

header{
  padding:18px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(15,23,42,0.9);
  backdrop-filter:blur(6px);
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.brand{
  font-size:20px;
  font-weight:600;
  letter-spacing:0.5px;
}

.gold-btn{
  background:linear-gradient(135deg,var(--gold1),var(--gold2));
  color:#111;
  padding:10px 18px;
  border:none;
  border-radius:25px;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 0 20px rgba(212,160,23,0.5);
  transition:0.3s;
}
.gold-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 0 30px rgba(212,160,23,0.8);
}

.container{
  padding:30px;
  max-width:1100px;
  margin:auto;
}

.section-title{
  margin:30px 0 15px 0;
  font-size:18px;
  color:var(--muted);
}

.game-card{
  background:var(--card);
  padding:14px 18px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
  transition:0.2s;
}
.game-card:hover{
  background:#1f2937;
}

.result-panel{
  margin-top:30px;
  background:var(--panel);
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 30px rgba(0,0,0,0.4);
}

.metric{
  margin:6px 0;
}

.drawer{
  position:fixed;
  top:0;
  right:-100%;
  width:420px;
  height:100%;
  background:#111827;
  padding:25px;
  transition:0.4s;
  overflow:auto;
  box-shadow:-10px 0 30px rgba(0,0,0,0.5);
  z-index:999;
}
.drawer.open{
  right:0;
}

.drawer h2{
  margin-top:0;
}

.rank-card{
  background:#1e293b;
  padding:12px;
  border-radius:8px;
  margin-bottom:10px;
  font-size:14px;
}

.close-btn{
  margin-top:10px;
  padding:6px 12px;
  border:none;
  background:#ef4444;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.small{
  font-size:12px;
  color:var(--muted);
}
</style>
</head>
<body>

<header>
  <div class="brand">Plakar Analytics</div>
  <button class="gold-btn" onclick="toggleRanking()">✨ OPORTUNIDADES DO DIA</button>
</header>

<div class="container">

  <div class="section-title">Jogos Disponíveis</div>
  <div id="games">Carregando...</div>

  <div class="result-panel" id="analysis"></div>

</div>

<div class="drawer" id="rankingDrawer">
  <h2>🔥 Ranking Inteligente</h2>
  <div id="rankingContent"></div>
  <button class="close-btn" onclick="toggleRanking()">Fechar</button>
</div>

<script>

let rankingData = [];

async function carregarJogos(){

  const res = await fetch("/api/games");
  const jogos = await res.json();
  const gamesDiv = document.getElementById("games");
  gamesDiv.innerHTML="";

  const limit = jogos.slice(0,8);

  for(const jogo of limit){

    const r = await fetch(`/api/analyze?homeId=${jogo.homeId}&awayId=${jogo.awayId}&home=${encodeURIComponent(jogo.home)}&away=${encodeURIComponent(jogo.away)}`);
    const data = await r.json();

    rankingData.push({
      home:jogo.home,
      away:jogo.away,
      probCasa:data.probCasa,
      probFora:data.probFora,
      over:data.over25,
      btts:data.btts
    });
  }

  gerarRanking();

  jogos.forEach(jogo=>{
    gamesDiv.innerHTML+=`
      <div class="game-card" onclick="analisar('${jogo.homeId}','${jogo.awayId}','${jogo.home}','${jogo.away}')">
        ${jogo.home} vs ${jogo.away}
        <span class="small">${jogo.status}</span>
      </div>
    `;
  });
}

function gerarRanking(){

  const topVit = [...rankingData].sort((a,b)=>b.probCasa-a.probCasa).slice(0,5);
  const topOver = [...rankingData].sort((a,b)=>b.over-a.over).slice(0,5);
  const topBTTS = [...rankingData].sort((a,b)=>b.btts-a.btts).slice(0,5);

  const div = document.getElementById("rankingContent");

  div.innerHTML=`
    <h3>🏆 Vitórias Mais Prováveis</h3>
    ${topVit.map(j=>`
      <div class="rank-card">
        ${j.home} vs ${j.away}
        <div class="small">Casa: ${(j.probCasa*100).toFixed(2)}%</div>
      </div>
    `).join("")}

    <h3>⚽ Over 2.5</h3>
    ${topOver.map(j=>`
      <div class="rank-card">
        ${j.home} vs ${j.away}
        <div class="small">Over: ${(j.over*100).toFixed(2)}%</div>
      </div>
    `).join("")}

    <h3>🎯 BTTS</h3>
    ${topBTTS.map(j=>`
      <div class="rank-card">
        ${j.home} vs ${j.away}
        <div class="small">BTTS: ${(j.btts*100).toFixed(2)}%</div>
      </div>
    `).join("")}
  `;
}

function toggleRanking(){
  document.getElementById("rankingDrawer").classList.toggle("open");
}

async function analisar(homeId,awayId,home,away){

  document.getElementById("analysis").innerHTML="Analisando...";

  const res = await fetch(`/api/analyze?homeId=${homeId}&awayId=${awayId}&home=${encodeURIComponent(home)}&away=${encodeURIComponent(away)}`);
  const data = await res.json();

  function oddJusta(prob){ return (1/prob).toFixed(2); }

  document.getElementById("analysis").innerHTML=`
    <h2>${data.home} vs ${data.away}</h2>
    <div class="metric">Casa: ${(data.probCasa*100).toFixed(2)}% | Odd Justa: ${oddJusta(data.probCasa)}</div>
    <div class="metric">Empate: ${(data.probEmpate*100).toFixed(2)}% | Odd Justa: ${oddJusta(data.probEmpate)}</div>
    <div class="metric">Fora: ${(data.probFora*100).toFixed(2)}% | Odd Justa: ${oddJusta(data.probFora)}</div>
    <div class="metric">Over 2.5: ${(data.over25*100).toFixed(2)}% | Odd Justa: ${oddJusta(data.over25)}</div>
    <div class="metric">BTTS: ${(data.btts*100).toFixed(2)}% | Odd Justa: ${oddJusta(data.btts)}</div>
  `;
}

carregarJogos();

</script>
</body>
</html>
