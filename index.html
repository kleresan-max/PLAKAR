<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KLERIN ANÁLISES AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  font-family:Inter, Arial;
  background:#0f172a;
  color:white;
}

/* LOGIN */
.login-screen{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:#0f172a;
}

.login-box{
  background:#1e293b;
  padding:30px;
  border-radius:10px;
  width:300px;
  text-align:center;
}

input{
  width:100%;
  padding:8px;
  margin-top:10px;
  border-radius:6px;
  border:none;
}

button{
  margin-top:15px;
  padding:8px;
  width:100%;
  border:none;
  border-radius:6px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

#error{
  color:#ef4444;
  font-size:12px;
  margin-top:10px;
}

/* APP */
#app{
  display:none;
}

header{
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:600;
  background:#111827;
}

.card{
  background:#1e293b;
  margin:15px;
  padding:15px;
  border-radius:10px;
}

</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login-screen">
  <div class="login-box">
    <h2>🔐 KLERIN ANÁLISES AI</h2>
    <input type="password" id="senha" placeholder="Digite sua senha">
    <button onclick="entrar()">Entrar</button>
    <div id="error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>⚡ KLERIN ANÁLISES AI</header>
  <div class="card">
    Sistema protegido. Acesso autorizado.
  </div>
</div>

<script>

/* SENHA PRIVADA */
const senhaCorreta = "KLERIN2025";

/* LOGIN */
function entrar(){
  const senha = document.getElementById("senha").value;
  if(senha === senhaCorreta){
    localStorage.setItem("autorizado","sim");
    liberar();
  } else {
    document.getElementById("error").innerText="Senha incorreta";
  }
}

function liberar(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
}

/* Verifica se já está logado */
if(localStorage.getItem("autorizado")==="sim"){
  liberar();
}

/* PWA */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
