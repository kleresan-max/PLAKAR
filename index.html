<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KLERIN ANÁLISES AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#111827">
<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  font-family:Inter, Arial;
  background:linear-gradient(135deg,#0f172a,#111827);
  color:white;
}
header{
  padding:18px;
  font-size:20px;
  font-weight:600;
  text-align:center;
  background:rgba(17,24,39,0.95);
  backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(255,255,255,0.05);
}
nav{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  background:#111827;
  flex-wrap:wrap;
}
nav button{
  padding:8px 16px;
  border:none;
  border-radius:20px;
  background:#1f2937;
  color:white;
  cursor:pointer;
  transition:0.3s;
}
nav button.active{
  background:linear-gradient(90deg,#22c55e,#16a34a);
}
.container{
  padding:20px;
  max-width:1100px;
  margin:auto;
}
.tab{ display:none; }
.tab.active{ display:block; }

.card{
  background:rgba(30,41,59,0.7);
  backdrop-filter:blur(8px);
  padding:18px;
  margin-bottom:15px;
  border-radius:12px;
  box-shadow:0 0 15px rgba(0,0,0,0.4);
}
.badge{
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
}
.badge-gold{ background:#d4af37; color:black; }
.badge-silver{ background:#9ca3af; color:black; }
button.view{
  margin-top:10px;
  padding:6px 12px;
  border:none;
  border-radius:6px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}
.chances{
  margin-top:12px;
  display:none;
}
.strong{ color:#22c55e; font-weight:bold; }
.medium{ color:#facc15; font-weight:bold; }
.neutral{ color:#cbd5e1; }
.panel{
  background:rgba(17,24,39,0.9);
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}
.small{
  font-size:12px;
  color:#94a3b8;
}
</style>
</head>
<body>

<header>⚡ KLERIN ANÁLISES AI</header>

<nav>
<button onclick="trocarAba('radar')" class="active">Radar</button>
<button onclick="trocarAba('ouro')">Ouro</button>
<button onclick="trocarAba('prata')">Prata</button>
<button onclick="trocarAba('live')">Ao Vivo</button>
<button onclick="trocarAba('stats')">Estatísticas</button>
</nav>

<div class="container">
<div id="radar" class="tab active"></div>
<div id="ouro" class="tab"></div>
<div id="prata" class="tab"></div>
<div id="live" class="tab"></div>
<div id="stats" class="tab">
  <div class="panel">
    <h2>📊 Assertividade</h2>
    <div id="estatisticas">Carregando...</div>
  </div>
</div>
</div>

<script>

function trocarAba(id){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
}

function classe(prob){
  if(prob>=0.70) return "strong";
  if(prob>=0.60) return "medium";
  return "neutral";
}

function toggle(btn){
  const div = btn.nextElementSibling;
  div.style.display = div.style.display==="block"?"none":"block";
}

async function carregar(){

  const res = await fetch("/api/games");
  const jogos = await res.json();

  let radar="", ouro="", prata="", live="";

  for(const jogo of jogos.slice(0,20)){

    const r = await fetch(`/api/analyze?homeId=${jogo.homeId}&awayId=${jogo.awayId}&home=${encodeURIComponent(jogo.home)}&away=${encodeURIComponent(jogo.away)}`);
    const data = await r.json();

    const mercados = [
      {nome:"Casa",prob:data.probCasa},
      {nome:"Fora",prob:data.probFora},
      {nome:"Over",prob:data.over25},
      {nome:"BTTS",prob:data.btts}
    ];

    const temOuro = mercados.some(m=>m.prob>=0.70);
    const temPrata = mercados.some(m=>m.prob>=0.60 && m.prob<0.70);

    let card = `
      <div class="card">
        <div>${jogo.home} vs ${jogo.away}</div>
        ${temOuro?'<div class="badge badge-gold">OURO</div>':
          temPrata?'<div class="badge badge-silver">PRATA</div>':''}
        <button class="view" onclick="toggle(this)">Ver Chances</button>
        <div class="chances">
          ${mercados.map(m=>`
            <div class="${classe(m.prob)}">
              ${m.nome}: ${(m.prob*100).toFixed(2)}% | Odd ${(1/m.prob).toFixed(2)}
            </div>
          `).join("")}
        </div>
      </div>
    `;

    radar += card;
    if(temOuro) ouro += card;
    if(temPrata) prata += card;
    if(jogo.status==="LIVE") live += card;
  }

  document.getElementById("radar").innerHTML = radar;
  document.getElementById("ouro").innerHTML = ouro;
  document.getElementById("prata").innerHTML = prata;
  document.getElementById("live").innerHTML = live;
}

carregar();
setInterval(carregar,600000);

/* Registrar Service Worker */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
