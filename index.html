<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Plakar Analytics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

:root{
  --bg:#0b1220;
  --panel:#111827;
  --card:#1e293b;
  --muted:#94a3b8;
  --green:#22c55e;
  --yellow:#facc15;
  --gold1:#f5d27a;
  --gold2:#d4a017;
  --silver1:#d1d5db;
  --silver2:#9ca3af;
}

body{
  margin:0;
  background:linear-gradient(180deg,#0b1220,#0f172a);
  font-family:Arial;
  color:white;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 30px;
  background:#0f172a;
}

.brand{
  font-size:20px;
  font-weight:bold;
}

.buttons{
  display:flex;
  gap:12px;
}

.gold-btn{
  background:linear-gradient(135deg,var(--gold1),var(--gold2));
  color:#111;
  padding:10px 18px;
  border:none;
  border-radius:25px;
  font-weight:bold;
  cursor:pointer;
}

.silver-btn{
  background:linear-gradient(135deg,var(--silver1),var(--silver2));
  color:#111;
  padding:10px 18px;
  border:none;
  border-radius:25px;
  font-weight:bold;
  cursor:pointer;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:30px;
}

.game-card{
  background:var(--card);
  padding:14px 18px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}

.result-panel{
  margin-top:30px;
  background:var(--panel);
  padding:25px;
  border-radius:14px;
}

.metric{
  margin:12px 0;
}

.bar-container{
  background:#1f2937;
  height:8px;
  border-radius:5px;
  overflow:hidden;
  margin-top:5px;
}

.bar{
  height:8px;
  background:linear-gradient(90deg,#22c55e,#16a34a);
  width:0%;
  transition:width 1s ease;
}

.drawer{
  position:fixed;
  right:-100%;
  top:0;
  width:420px;
  height:100%;
  background:#111827;
  padding:25px;
  transition:0.4s;
  overflow:auto;
  z-index:999;
}
.drawer.open{
  right:0;
}

.rank-card{
  background:#1e293b;
  padding:12px;
  border-radius:8px;
  margin-bottom:10px;
}

.close-btn{
  margin-top:15px;
  padding:8px 12px;
  border:none;
  background:#ef4444;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.small{
  font-size:12px;
  color:var(--muted);
}

</style>
</head>
<body>

<header>
  <div class="brand">Plakar Analytics</div>
  <div class="buttons">
    <button class="gold-btn" onclick="abrirPremium()">🔥 Premium 70%+</button>
    <button class="silver-btn" onclick="abrirMedio()">⚡ Nível Médio</button>
  </div>
</header>

<div class="container">

  <div id="games">Carregando...</div>
  <div class="result-panel" id="analysis"></div>

</div>

<div class="drawer" id="rankingDrawer">
  <h2 id="rankingTitle"></h2>
  <div id="rankingContent"></div>
  <button class="close-btn" onclick="fechar()">Fechar</button>
</div>

<script>

let rankingData=[];

async function carregarJogos(){

  const res = await fetch("/api/games");
  const jogos = await res.json();
  const div=document.getElementById("games");
  div.innerHTML="";
  rankingData=[];

  const limit=jogos.slice(0,8);

  for(const jogo of limit){
    const r=await fetch(`/api/analyze?homeId=${jogo.homeId}&awayId=${jogo.awayId}&home=${encodeURIComponent(jogo.home)}&away=${encodeURIComponent(jogo.away)}`);
    const data=await r.json();

    rankingData.push({
      home:jogo.home,
      away:jogo.away,
      probCasa:data.probCasa,
      probFora:data.probFora,
      over:data.over25,
      btts:data.btts
    });
  }

  jogos.forEach(jogo=>{
    div.innerHTML+=`
      <div class="game-card" onclick="analisar('${jogo.homeId}','${jogo.awayId}','${jogo.home}','${jogo.away}')">
        ${jogo.home} vs ${jogo.away}
        <span class="small">${jogo.status}</span>
      </div>
    `;
  });
}

function abrirPremium(){
  filtrarRanking("premium");
}

function abrirMedio(){
  filtrarRanking("medio");
}

function filtrarRanking(tipo){

  let filtrado;

  if(tipo==="premium"){
    document.getElementById("rankingTitle").innerText="🔥 Oportunidades Premium (70%+)";
    filtrado = rankingData.filter(j =>
      j.probCasa >= 0.70 ||
      j.probFora >= 0.70 ||
      j.over >= 0.70 ||
      j.btts >= 0.70
    );
  } else {
    document.getElementById("rankingTitle").innerText="⚡ Oportunidades Nível Médio (50% - 69%)";
    filtrado = rankingData.filter(j =>
      (j.probCasa >= 0.50 && j.probCasa < 0.70) ||
      (j.probFora >= 0.50 && j.probFora < 0.70) ||
      (j.over >= 0.50 && j.over < 0.70) ||
      (j.btts >= 0.50 && j.btts < 0.70)
    );
  }

  const div=document.getElementById("rankingContent");

  if(filtrado.length===0){
    div.innerHTML=`<div class="rank-card">Nenhuma oportunidade encontrada.</div>`;
  } else {
    div.innerHTML=filtrado.map(j=>`
      <div class="rank-card">
        ${j.home} vs ${j.away}
        <div class="small">
          ${j.probCasa>=0.50?`Casa ${(j.probCasa*100).toFixed(2)}%<br>`:''}
          ${j.probFora>=0.50?`Fora ${(j.probFora*100).toFixed(2)}%<br>`:''}
          ${j.over>=0.50?`Over ${(j.over*100).toFixed(2)}%<br>`:''}
          ${j.btts>=0.50?`BTTS ${(j.btts*100).toFixed(2)}%<br>`:''}
        </div>
      </div>
    `).join("");
  }

  document.getElementById("rankingDrawer").classList.add("open");
}

function fechar(){
  document.getElementById("rankingDrawer").classList.remove("open");
}

async function analisar(homeId,awayId,home,away){

  document.getElementById("analysis").innerHTML="Analisando...";

  const res=await fetch(`/api/analyze?homeId=${homeId}&awayId=${awayId}&home=${encodeURIComponent(home)}&away=${encodeURIComponent(away)}`);
  const data=await res.json();

  function bar(percent,id){
    setTimeout(()=>{
      document.getElementById(id).style.width=percent+"%";
    },100);
  }

  document.getElementById("analysis").innerHTML=`
    <h2>${data.home} vs ${data.away}</h2>

    <div class="metric">
      Casa ${(data.probCasa*100).toFixed(2)}%
      <div class="bar-container"><div class="bar" id="bar1"></div></div>
    </div>

    <div class="metric">
      Empate ${(data.probEmpate*100).toFixed(2)}%
      <div class="bar-container"><div class="bar" id="bar2"></div></div>
    </div>

    <div class="metric">
      Fora ${(data.probFora*100).toFixed(2)}%
      <div class="bar-container"><div class="bar" id="bar3"></div></div>
    </div>

    <div class="metric">
      Over 2.5 ${(data.over25*100).toFixed(2)}%
      <div class="bar-container"><div class="bar" id="bar4"></div></div>
    </div>

    <div class="metric">
      BTTS ${(data.btts*100).toFixed(2)}%
      <div class="bar-container"><div class="bar" id="bar5"></div></div>
    </div>
  `;

  bar((data.probCasa*100).toFixed(2),"bar1");
  bar((data.probEmpate*100).toFixed(2),"bar2");
  bar((data.probFora*100).toFixed(2),"bar3");
  bar((data.over25*100).toFixed(2),"bar4");
  bar((data.btts*100).toFixed(2),"bar5");
}

carregarJogos();

</script>
</body>
</html>
