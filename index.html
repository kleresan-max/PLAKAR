<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Plakar Radar Profissional</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
  margin:0;
  background:#0f172a;
  font-family:Arial;
  color:white;
}

header{
  padding:20px;
  background:#111827;
  font-size:20px;
  font-weight:bold;
}

.container{
  padding:25px;
  max-width:1300px;
  margin:auto;
}

.section{
  margin-bottom:40px;
}

.section h2{
  border-left:4px solid #22c55e;
  padding-left:10px;
}

.card{
  background:#1e293b;
  padding:10px 14px;
  margin-bottom:8px;
  border-radius:6px;
  font-size:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.left{
  max-width:70%;
}

.right{
  text-align:right;
}

.small{
  font-size:12px;
  color:#94a3b8;
}

.strong{
  color:#22c55e;
  font-weight:bold;
}

.medium{
  color:#84cc16;
  font-weight:bold;
}

.neutral{
  color:#cbd5e1;
}

.loading{
  font-size:18px;
}

</style>
</head>
<body>

<header>
🎯 Radar Profissional – Top 20 por Mercado (≥55%)  
<span style="font-size:12px;color:#94a3b8;">Atualiza automaticamente a cada 10 minutos</span>
</header>

<div class="container">
<div id="conteudo" class="loading">Carregando análises...</div>
</div>

<script>

async function carregar(){

  document.getElementById("conteudo").innerHTML = "Atualizando análises...";

  const res = await fetch("/api/games");
  const jogos = await res.json();

  let casa = [];
  let fora = [];
  let over = [];
  let btts = [];

  for(const jogo of jogos.slice(0,25)){

    const r = await fetch(`/api/analyze?homeId=${jogo.homeId}&awayId=${jogo.awayId}&home=${encodeURIComponent(jogo.home)}&away=${encodeURIComponent(jogo.away)}`);
    const data = await r.json();

    function oddJusta(prob){
      return (1/prob).toFixed(2);
    }

    function forcaClasse(prob){
      if(prob >= 0.70) return "strong";
      if(prob >= 0.60) return "medium";
      return "neutral";
    }

    if(data.probCasa >= 0.55){
      casa.push({ jogo:`${jogo.home} vs ${jogo.away}`, prob:data.probCasa });
    }

    if(data.probFora >= 0.55){
      fora.push({ jogo:`${jogo.home} vs ${jogo.away}`, prob:data.probFora });
    }

    if(data.over25 >= 0.55){
      over.push({ jogo:`${jogo.home} vs ${jogo.away}`, prob:data.over25 });
    }

    if(data.btts >= 0.55){
      btts.push({ jogo:`${jogo.home} vs ${jogo.away}`, prob:data.btts });
    }
  }

  casa.sort((a,b)=>b.prob-a.prob);
  fora.sort((a,b)=>b.prob-a.prob);
  over.sort((a,b)=>b.prob-a.prob);
  btts.sort((a,b)=>b.prob-a.prob);

  function render(lista, titulo){

    if(lista.length===0){
      return `
        <div class="section">
          <h2>${titulo}</h2>
          <div class="card">Nenhuma oportunidade ≥55%</div>
        </div>
      `;
    }

    return `
      <div class="section">
        <h2>${titulo}</h2>
        ${lista.slice(0,20).map((item,i)=>`
          <div class="card">
            <div class="left">
              ${i+1}. ${item.jogo}
            </div>
            <div class="right">
              <div class="${item.prob >=0.70 ? 'strong' : item.prob>=0.60 ? 'medium' : 'neutral'}">
                ${(item.prob*100).toFixed(2)}%
              </div>
              <div class="small">
                Odd Justa: ${(1/item.prob).toFixed(2)}
              </div>
            </div>
          </div>
        `).join("")}
      </div>
    `;
  }

  document.getElementById("conteudo").innerHTML =
      render(casa,"🏠 Vitória Casa")
    + render(fora,"🚩 Vitória Fora")
    + render(over,"⚽ Over 2.5")
    + render(btts,"🎯 Ambos Marcam");

}

carregar();

/* 🔁 Atualiza automaticamente a cada 10 minutos */
setInterval(carregar, 600000);

</script>

</body>
</html>
