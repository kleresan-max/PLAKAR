<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KLERIN ANÁLISES AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Manrope',sans-serif;
  background:radial-gradient(circle at top,#1e293b,#0f172a);
  color:white;
}

/* HEADER */
header{
  padding:18px;
  text-align:center;
  font-weight:800;
  font-size:20px;
  letter-spacing:1px;
}

/* BOTÕES */
.top{
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

.top button{
  padding:6px 14px;
  border-radius:20px;
  border:none;
  font-size:12px;
  cursor:pointer;
  background:#1e293b;
  color:#94a3b8;
  transition:.3s;
}

.top .active{
  background:#22c55e;
  color:white;
}

/* PLATAFORMA FLUTUANTE */
.wrapper{
  max-width:1100px;
  margin:20px auto;
  padding:20px;
  background:rgba(17,24,39,0.8);
  backdrop-filter:blur(15px);
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

/* LIGA */
.league{
  margin-top:25px;
  font-size:13px;
  font-weight:700;
  color:#22c55e;
  border-bottom:1px solid rgba(255,255,255,0.1);
  padding-bottom:4px;
}

/* CARD */
.card{
  margin-top:12px;
  padding:12px;
  background:#1e293b;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:12px;
}

.team{
  display:flex;
  align-items:center;
  gap:6px;
  width:40%;
}

.team img{width:22px;height:22px}

.score{
  font-weight:800;
  font-size:14px;
}

.rank{
  font-weight:700;
  color:#22c55e;
  width:25px;
}

.gold{
  background:#d4af37;
  color:black;
  padding:2px 6px;
  border-radius:6px;
  font-size:10px;
}

.ranking{
  margin-bottom:20px;
  padding:15px;
  background:#111827;
  border-radius:12px;
}

.small{font-size:11px;color:#94a3b8}

@media(max-width:600px){
  .card{flex-direction:column;align-items:flex-start}
  .team{width:100%}
  .score{margin:6px 0}
}
</style>
</head>
<body>

<header>⚡ KLERIN ANÁLISES AI</header>

<div class="top">
<button onclick="mudar('radar')" class="active" id="radarBtn">Radar</button>
<button onclick="mudar('ouro')" id="ouroBtn">Ouro</button>
<button onclick="mudar('ligas')" id="ligasBtn">Ligas</button>
</div>

<div class="wrapper">

<div id="ranking"></div>
<div id="conteudo"></div>

</div>

<script>

let modo="radar";

function mudar(n){
modo=n;
document.querySelectorAll(".top button").forEach(b=>b.classList.remove("active"));
document.getElementById(n+"Btn").classList.add("active");
carregar();
}

async function carregar(){

const res=await fetch("/api/games");
const jogos=await res.json();

let html="";
let rankingLista=[];
let ligas={};

for(const jogo of jogos){

const r=await fetch(`/api/analyze?homeId=${jogo.homeId}&awayId=${jogo.awayId}&home=${encodeURIComponent(jogo.home)}&away=${encodeURIComponent(jogo.away)}`);
const data=await r.json();

const mercados=[
{nome:"Casa",prob:data.probCasa},
{nome:"Fora",prob:data.probFora},
{nome:"Over",prob:data.over25},
{nome:"BTTS",prob:data.btts}
];

mercados.forEach(m=>rankingLista.push({
jogo:jogo.home+" vs "+jogo.away,
prob:m.prob
}));

if(!ligas[jogo.competition]) ligas[jogo.competition]=[];
ligas[jogo.competition].push({jogo,data});
}

/* RANKING TOP 20 */
rankingLista.sort((a,b)=>b.prob-a.prob);
document.getElementById("ranking").innerHTML=`
<div class="ranking">
<h3>🏆 Top 20 Oportunidades</h3>
${rankingLista.slice(0,20).map((r,i)=>`
<div class="small">${i+1}º - ${r.jogo} ${(r.prob*100).toFixed(0)}%</div>
`).join("")}
</div>
`;

if(modo==="ligas"){

for(const liga in ligas){

html+=`<div class="league">${liga}</div>`;

ligas[liga].forEach(item=>{
html+=`
<div class="card">
<div class="team">
<img src="${item.jogo.homeCrest}">
${item.jogo.home}
</div>

<div class="score">- x -</div>

<div class="team" style="justify-content:flex-end;">
${item.jogo.away}
<img src="${item.jogo.awayCrest}">
</div>
</div>
`;
});
}

}else{

rankingLista.slice(0,20).forEach((r,i)=>{
html+=`
<div class="card">
<div class="rank">${i+1}º</div>
<div>${r.jogo}</div>
<div>${(r.prob*100).toFixed(0)}%
${r.prob>=0.70?'<span class="gold">OURO</span>':''}
</div>
</div>
`;
});
}

document.getElementById("conteudo").innerHTML=html;
}

carregar();
setInterval(carregar,30000);

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
