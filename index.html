<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KLERIN ANÁLISES AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Manrope',sans-serif;
  background:radial-gradient(circle at top,#1e293b,#0f172a);
  color:white;
}

/* HEADER */
header{
  padding:18px;
  text-align:center;
  font-weight:800;
  font-size:18px;
}

/* BOTÕES */
.top{
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:15px;
}
.top button{
  padding:6px 14px;
  border-radius:20px;
  border:none;
  font-size:11px;
  cursor:pointer;
  background:#1e293b;
  color:#94a3b8;
}
.top .active{
  background:#22c55e;
  color:white;
}

/* PLATAFORMA */
.wrapper{
  max-width:1100px;
  margin:20px auto;
  padding:20px;
  background:rgba(17,24,39,0.85);
  backdrop-filter:blur(12px);
  border-radius:18px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

/* CARD */
.card{
  margin-top:12px;
  padding:12px;
  background:#1e293b;
  border-radius:12px;
  font-size:11px;
}

.match{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.team{
  display:flex;
  align-items:center;
  gap:6px;
  width:40%;
}
.team img{width:22px;height:22px}
.score{font-weight:800}

.live{
  background:#ef4444;
  padding:2px 6px;
  border-radius:6px;
  font-size:9px;
  animation:pulse 1s infinite;
}
@keyframes pulse{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}

.bar{
  height:5px;
  background:#0f172a;
  border-radius:10px;
  overflow:hidden;
  margin-top:3px;
}
.fill{
  height:100%;
  background:#22c55e;
}

.alta{color:#22c55e}
.media{color:#facc15}
.baixa{color:#ef4444}

.gold{
  background:#d4af37;
  color:black;
  padding:2px 5px;
  border-radius:5px;
  font-size:9px;
}

.ranking{
  background:#111827;
  padding:10px;
  border-radius:12px;
  margin-bottom:15px;
}
.small{font-size:10px;color:#94a3b8}

.forma span{
  display:inline-block;
  width:8px;height:8px;
  border-radius:50%;
  margin-right:3px;
}
.win{background:#22c55e}
.draw{background:#facc15}
.loss{background:#ef4444}

</style>
</head>
<body>

<header>⚡ KLERIN ANÁLISES AI</header>

<div class="top">
<button onclick="modo='radar';carregar()" class="active" id="radarBtn">Radar</button>
<button onclick="modo='ouro';carregar()" id="ouroBtn">Ouro</button>
<button onclick="modo='prata';carregar()" id="prataBtn">Prata</button>
<button onclick="modo='ligas';carregar()" id="ligasBtn">Ligas</button>
</div>

<div class="wrapper">

<div id="ranking"></div>
<div id="conteudo"></div>
<div id="historico"></div>

</div>

<script>

let modo="radar";

function nivel(p){
if(p>=0.70)return"alta";
if(p>=0.60)return"media";
return"baixa";
}

function mostrarHistorico(){
let hist=JSON.parse(localStorage.getItem("historico")||"[]");
let acertos=hist.filter(h=>h.resultado==="acerto").length;
let total=hist.length;
let taxa=total?((acertos/total)*100).toFixed(1):0;
document.getElementById("historico").innerHTML=`
<div class="ranking">
<h3>💎 Histórico</h3>
<div class="small">Total: ${total} | Acertos: ${acertos} | Taxa: ${taxa}%</div>
</div>
`;
}

async function carregar(){

const res=await fetch("/api/games");
const jogos=await res.json();

let html="";
let rankingLista=[];
let ligas={};

for(const jogo of jogos){

const r=await fetch(`/api/analyze?homeId=${jogo.homeId}&awayId=${jogo.awayId}&home=${encodeURIComponent(jogo.home)}&away=${encodeURIComponent(jogo.away)}`);
const data=await r.json();

const mercados=[
{nome:"Casa",prob:data.probCasa},
{nome:"Fora",prob:data.probFora},
{nome:"Over",prob:data.over25},
{nome:"BTTS",prob:data.btts}
];

mercados.forEach(m=>rankingLista.push({
jogo:jogo.home+" vs "+jogo.away,
prob:m.prob
}));

if(!ligas[jogo.competition])ligas[jogo.competition]=[];
ligas[jogo.competition].push({jogo,mercados});
}

rankingLista.sort((a,b)=>b.prob-a.prob);

document.getElementById("ranking").innerHTML=`
<div class="ranking">
<h3>🏆 Top 20</h3>
${rankingLista.slice(0,20).map((r,i)=>`
<div class="small">${i+1}º - ${r.jogo} ${(r.prob*100).toFixed(0)}%</div>
`).join("")}
</div>
`;

if(modo==="ligas"){
for(const liga in ligas){
html+=`<div class="small" style="margin-top:10px;font-weight:700;color:#22c55e">${liga}</div>`;
ligas[liga].forEach(item=>{
html+=renderCard(item.jogo,item.mercados);
});
}
}else{
rankingLista.slice(0,20).forEach((r,i)=>{
let jogo=ligas[Object.keys(ligas)[0]].find(j=>j.jogo.home+" vs "+j.jogo.away===r.jogo);
});
for(const liga in ligas){
ligas[liga].forEach(item=>{
if(modo==="ouro" && !item.mercados.some(m=>m.prob>=0.70))return;
if(modo==="prata" && !item.mercados.some(m=>m.prob>=0.60 && m.prob<0.70))return;
html+=renderCard(item.jogo,item.mercados);
});
}
}

document.getElementById("conteudo").innerHTML=html;
mostrarHistorico();
}

function renderCard(jogo,mercados){
return `
<div class="card">
<div class="match">
<div class="team">
<img src="${jogo.homeCrest}">
${jogo.home}
</div>

<div class="score">
- x -
${jogo.status==="LIVE"?'<span class="live">LIVE</span>':''}
</div>

<div class="team" style="justify-content:flex-end;">
${jogo.away}
<img src="${jogo.awayCrest}">
</div>
</div>

<div class="forma small">Forma:
<span class="win"></span>
<span class="draw"></span>
<span class="loss"></span>
<span class="win"></span>
<span class="win"></span>
</div>

${mercados.map(m=>`
<div class="small">
${m.nome} ${(m.prob*100).toFixed(0)}%
${m.prob>=0.70?'<span class="gold">OURO</span>':''}
</div>
<div class="bar"><div class="fill" style="width:${m.prob*100}%"></div></div>
<div class="${nivel(m.prob)} small">Confiança ${nivel(m.prob).toUpperCase()}</div>
`).join("")}

</div>
`;
}

carregar();
setInterval(carregar,30000);

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}

</script>
</body>
</html>
